name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  coreutils-parity:
    name: Coreutils parity (Docker)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run coreutils parity vs GNU coreutils and uutils in container
        run: ./coreutils/tests/run-parity.sh --require-docker

  coreutils-parity-matrix:
    name: Coreutils parity matrix (Docker)
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run extended coreutils flag-combination matrix in container
        run: ./coreutils/tests/run-parity-matrix.sh --require-docker
